scene:
  name: my_image_scene
  input_type: images
  input_path: /path/to/images
  output_dir: data_dir/custom/my_image_scene

frame:
  target_fps: 3
  max_frames: 120
  resolution: [512, 512]
  overwrite: true

camera:
  mode: fixed
  provided_transforms: null
  fixed_camera: true
  assume_fov_deg: 60

vlm:
  config_path: configs/vlm_local.yaml
  frame_sampling:
    max_images: 8
    strategy: uniform
    image_max_side: 768

mask:
  mode: zaiwu_seg2track_sam2
  service_url: http://127.0.0.1:20010
  text_prompt: auto
  use_vlm_prompt: true
  provided_dir: null
  detect_interval: 3
  window_size: 300
  box_threshold: 0.25
  text_threshold: 0.2
  background_value: 255
  min_area_ratio: 0.001
  min_visible_frames: 2

depth:
  mode: dummy
  provided_dir: null
  save_format: npy
  clip_min: 0.05
  clip_max: 20.0

normal:
  mode: depth_to_normal
  provided_dir: null
  save_format: png

graph:
  mode: auto_simple
  manual_graph: null
  root_id: 0
  vertical_gap_threshold: 0.08
  xy_overlap_threshold: 0.15

review:
  make_mask_overlay: true
  make_depth_vis: true
  make_normal_vis: true
