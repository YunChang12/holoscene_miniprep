scene:
  name: room0_mini_s2t
  input_type: images
  input_path: tmp_tests/room0_mini/images
  output_dir: data_dir/custom/room0_mini_s2t

frame:
  target_fps: 3
  max_frames: null
  resolution: [512, 512]
  overwrite: false

camera:
  mode: provided
  provided_transforms: tmp_tests/room0_mini/transforms_official.json

vlm:
  config_path: configs/vlm_local.yaml
  frame_sampling:
    max_images: 8
    strategy: uniform
    image_max_side: 768

mask:
  mode: zaiwu_seg2track_sam2
  service_url: http://127.0.0.1:20010
  text_prompt: auto
  use_vlm_prompt: true
  detect_interval: 5
  window_size: 300
  box_threshold: 0.3
  text_threshold: 0.25
  background_value: 255
  min_area_ratio: 0.001
  min_visible_frames: 3
  overwrite: false

depth:
  mode: zaiwu_da3
  service_url: http://127.0.0.1:8443
  clip_min: 0.05
  clip_max: 20.0
  overwrite: false

normal:
  mode: depth_to_normal
  overwrite: false

graph:
  mode: auto_simple
  root_id: 0
  vertical_gap_threshold: 0.08
  xy_overlap_threshold: 0.15

validation:
  strict: false

review:
  make_mask_overlay: true
  make_depth_vis: true
  make_normal_vis: true
  export_camera_trajectory: true
  export_instance_clouds: true
  export_graph_vis: true
